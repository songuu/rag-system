allowBuilds:
  protobufjs: true
  sharp: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@langchain/core@1.1.47'
  - '@langchain/langgraph-sdk@1.9.3'
  - '@langchain/langgraph@1.3.1'
  - '@langchain/openai@1.4.6'
  - '@types/node@25.9.0'
  - '@llamaindex/liteparse-darwin-arm64@2.0.1'
  - '@llamaindex/liteparse-linux-arm64-gnu@2.0.1'
  - '@llamaindex/liteparse-linux-x64-gnu@2.0.1'
  - '@llamaindex/liteparse-win32-x64-msvc@2.0.1'
  - '@llamaindex/liteparse@2.0.1'
onlyBuiltDependencies:
  - sharp
peerDependencyRules:
  allowedVersions:
    eslint-plugin-import>eslint: '10'
    eslint-plugin-jsx-a11y>eslint: '10'
    eslint-plugin-react>eslint: '10'
    '@browserbasehq/stagehand>openai': '6'
    '@browserbasehq/stagehand>zod': '4'
    '@tailwindcss/typography>tailwindcss': '4'
    tailwindcss-animate>tailwindcss: '4'
